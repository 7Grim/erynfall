name: Deploy Erynfall Auth

on:
  push:
    branches: [ main ]
    paths:
      - 'auth/**'
      - 'shared/**'
      - 'pom.xml'
      - '.github/workflows/main_app-erynfall-auth.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build auth service jar
        run: mvn -pl auth -am clean package -DskipTests

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-erynfall-auth
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_APP_ERYNFALL_AUTH }}
          package: auth/target/erynfall-auth-0.1.0-SNAPSHOT.jar
