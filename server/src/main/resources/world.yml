    npc_ids: [6, 7, 8]
    respawn_ticks: 600
    max_alive: 3

  cow_spawn:
    npc_ids: [9, 10]
    respawn_ticks: 1200
    max_alive: 2

  goblin_spawn:
    npc_ids: [11]
    respawn_ticks: 900
    max_alive: 1

loot_tables:
  rat_basic:
    always:
      - item_id: 526
        quantity: 1
    common:
      - item_id: 1000
        quantity: 1
        chance: 100

  chicken_basic:
    always:
      - item_id: 526
        quantity: 1
      - item_id: 2138
        quantity: 1
      - item_id: 314
        quantity: 5
        max_quantity: 15
    rare:
      - item_id: 995
        quantity: 5
        max_quantity: 25
        chance: 30

  cow_basic:
    always:
      - item_id: 526
        quantity: 1
      - item_id: 2142
        quantity: 1
      - item_id: 1739
        quantity: 1
