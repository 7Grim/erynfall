loot_tables:
  # --- Rat (level 1) ---
  # OSRS: Rat's tail (always, used in Witch's Potion quest), no bones
  rat_basic:
    always:
      - item_id: 526    # Bones
        quantity: 1
      - item_id: 1000   # Rat's tail
        quantity: 1
    common:
      - item_id: 995    # Coins (1–3)
        quantity: 1
        max_quantity: 3
        chance: 20      # 20% chance

  # --- Giant Rat (level 3) ---
  # OSRS: Bones (always), Raw rat meat (always), Clue scroll beginner (1/128)
  giant_rat_basic:
    always:
      - item_id: 526    # Bones
        quantity: 1
      - item_id: 2134   # Raw rat meat
        quantity: 1
    rare:
      - item_id: 995    # Coins (1-5) — small bonus
        quantity: 1
        max_quantity: 5
        chance: 15      # 0.15% of 10000 = ~1.5% chance

  # --- Chicken (level 1) ---
  # OSRS: Bones (always), Raw chicken (always), Feathers 5-15 (always)
  # Bronze arrows added: chickens are the classic low-level ranged training target,
  # so they always drop a small supply of the starter ammo.
  chicken_basic:
    always:
      - item_id: 526    # Bones
        quantity: 1
      - item_id: 2138   # Raw chicken
        quantity: 1
      - item_id: 314    # Feathers
        quantity: 5
        max_quantity: 15
      - item_id: 882    # Bronze arrow (5-15 per kill — keeps ranged trainers stocked)
        quantity: 5
        max_quantity: 15

  # --- Cow (level 2) ---
  # Bones, cowhide, and raw beef make cows relevant to both Crafting and Cooking.
  cow_basic:
    always:
      - item_id: 526    # Bones
        quantity: 1
      - item_id: 2142   # Cowhide
        quantity: 1
      - item_id: 2132   # Raw beef
        quantity: 1
    common:
      - item_id: 995    # Coins (1-5)
        quantity: 1
        max_quantity: 5
        chance: 30      # 30%

  # --- Goblin (level 2) ---
  # OSRS: Bones (always), Coins 1-13 (common ~72%), Goblin mail (very rare)
  goblin_basic:
    always:
      - item_id: 526    # Bones
        quantity: 1
    common:
      - item_id: 995    # Coins (1-13)
        quantity: 1
        max_quantity: 13
        chance: 72      # 72% — matches OSRS drop rate
      - item_id: 882    # Bronze arrow (1-5, ~30%) — goblins carry crude ammunition
        quantity: 1
        max_quantity: 5
        chance: 30
    rare:
      - item_id: 841    # Shortbow (~1% — a looted shortbow)
        quantity: 1
        chance: 100     # 100 out of 10000 = 1%
