loot_tables:
  # --- Rat (level 1) ---
  # OSRS: Rat's tail (always, used in Witch's Potion quest), no bones
  rat_basic:
    always:
      - item_id: 526    # Bones
        quantity: 1
      - item_id: 1000   # Rat's tail
        quantity: 1
    common:
      - item_id: 995    # Coins (1–3)
        quantity: 1
        max_quantity: 3
        chance: 20      # 20% chance

  # --- Giant Rat (level 3) ---
  # OSRS: Bones (always), Raw rat meat (always), Clue scroll beginner (1/128)
  giant_rat_basic:
    always:
      - item_id: 526    # Bones
        quantity: 1
      - item_id: 2134   # Raw rat meat
        quantity: 1
    rare:
      - item_id: 995    # Coins (1-5) — small bonus
        quantity: 1
        max_quantity: 5
        chance: 15      # 0.15% of 10000 = ~1.5% chance

  # --- Chicken (level 1) ---
  # OSRS: Bones (always), Raw chicken (always), Feathers 5-15 (always)
  chicken_basic:
    always:
      - item_id: 526    # Bones
        quantity: 1
      - item_id: 2138   # Raw chicken
        quantity: 1
      - item_id: 314    # Feathers
        quantity: 5
        max_quantity: 15

  # --- Cow (level 2) ---
  # OSRS: Bones (always), Cowhide (always)
  cow_basic:
    always:
      - item_id: 526    # Bones
        quantity: 1
      - item_id: 2142   # Cowhide
        quantity: 1
    common:
      - item_id: 995    # Coins (1-5)
        quantity: 1
        max_quantity: 5
        chance: 30      # 30%

  # --- Goblin (level 2) ---
  # OSRS: Bones (always), Coins 1-13 (common ~72%), Goblin mail (very rare)
  goblin_basic:
    always:
      - item_id: 526    # Bones
        quantity: 1
    common:
      - item_id: 995    # Coins (1-13)
        quantity: 1
        max_quantity: 13
        chance: 72      # 72% — matches OSRS drop rate
