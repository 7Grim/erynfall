# OSRS-MMORP World Configuration
# All coordinates use the client 0-104 tile system.
# Player spawns at (50, 50) — the centre of the Tutorial Island map.

world:
  spawn_x: 50
  spawn_y: 50
  spawn_location: "tutorial_island"

maps:
  tutorial_island:
    name: "Tutorial Island"
    min_x: 8
    min_y: 8
    max_x: 96
    max_y: 96
    description: "Starting area for new players"

npcs:
  # --- Tutorial staff (low wander radius — they stay near their post) ---
  - id: 1
    name: "Tutorial Guide"
    combat_level: 0
    location: "tutorial_island"
    x: 52
    y: 48
    wander_radius: 2
    is_aggressive: false

  - id: 2
    name: "Combat Instructor"
    combat_level: 0
    location: "tutorial_island"
    x: 55
    y: 45
    wander_radius: 2
    is_aggressive: false

