# Tutorial Island Quest Configuration

quests:
  - id: 1
    name: "Tutorial Island"
    description: "Complete the Tutorial Island training"
    miniquest: true
    quest_points: 1
    free_to_play: true
    reward_skill_index: 3   # Hitpoints XP on completion
    tasks:
      - id: "speak_guide"
        type: "dialogue"
        description: "Speak to the Tutorial Guide"
        npc_id: 1
        dialogue_id: "dialogue_tutorial_intro"
        reward_xp: 10
        
      - id: "learn_combat"
        type: "dialogue"
        description: "Speak to the Combat Instructor"
        npc_id: 2
        dialogue_id: "dialogue_combat_instructor"
        reward_xp: 25
        
      - id: "kill_rats"
        type: "kill"
        description: "Defeat 5 rats"
        npc_id: 3
        count: 5
        reward_xp: 150
        
      - id: "collect_logs"
        type: "collect"
        description: "Collect 10 oak logs"
        item_id: 1521
        count: 10
        reward_xp: 100

      - id: "catch_fish"
        type: "collect"
        description: "Catch 5 raw shrimps at the fishing spot"
        item_id: 317
        count: 5
        reward_xp: 50

      - id: "cook_food"
        type: "action"
        description: "Cook 5 food items at the cooking fire"
        npc_id: 35
        count: 5
        reward_xp: 100
        
      - id: "equip_armor"
        type: "equip"
        description: "Equip training armour"
        item_id: 1115
        reward_xp: 50

      - id: "bury_bones"
        type: "action"
        description: "Bury 5 bones"
        item_id: 526
        count: 5
        reward_xp: 25

      - id: "light_fire"
        type: "action"
        description: "Light a fire using your tinderbox"
        item_id: 1521
        count: 1
        reward_xp: 40

      - id: "return_to_guide"
        type: "hand_in"
        description: "Return to the Tutorial Guide to complete the tutorial"
        npc_id: 1
        reward_xp: 0

    # Quest completion reward
    total_reward_xp: 550
    total_reward_gold: 0
    
    # Skill requirements (none for tutorial)
    requirements: []
    
    # Next quest after completion
    next_quest_id: null
