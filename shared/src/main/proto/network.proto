syntax = "proto3";

package com.osrs.protocol;

option java_package = "com.osrs.protocol";
option java_outer_classname = "NetworkProto";

// Handshake: Client → Server
message Handshake {
    string username = 1;
    string password = 2;
}

// HandshakeResponse: Server → Client
message HandshakeResponse {
    bool success = 1;
    string message = 2;
    int32 player_id = 3;
}

// PlayerMovement: Client → Server
message PlayerMovement {
    int32 x = 1;              // World tile X coordinate
    int32 y = 2;              // World tile Y coordinate
    int32 facing = 3;         // Direction 0-7 (N, NE, E, SE, S, SW, W, NW)
    int64 sequence = 4;       // Packet sequence number
}

// Entity: Server → Client (represents any entity)
message Entity {
    int32 id = 1;
    string name = 2;
    int32 x = 3;
    int32 y = 4;
    int32 facing = 5;
    int32 sprite_id = 6;
    int32 animation_frame = 7;
    int32 health = 8;
    int32 max_health = 9;
    bool is_player = 10;
}

// WorldState: Server → Client
message WorldState {
    repeated Entity entities = 1;
    int32 server_tick = 2;
    repeated EntityUpdate updates = 3;
}

// EntityUpdate: Partial update (only changed fields)
message EntityUpdate {
    int32 entity_id = 1;
    optional int32 x = 2;
    optional int32 y = 3;
    optional int32 facing = 4;
    optional int32 animation_frame = 5;
    optional int32 health = 6;
}

// CombatHit: Server → Client
message CombatHit {
    int32 attacker_id = 1;
    int32 target_id = 2;
    int32 damage = 3;
    bool hit = 4;
    int32 xp_awarded = 5;
}

// DialoguePrompt: Server → Client
message DialoguePrompt {
    int32 npc_id = 1;
    string npc_says = 2;
    repeated DialogueOption options = 3;
}

// DialogueOption: One response choice
message DialogueOption {
    int32 option_id = 1;
    string text = 2;
}

// DialogueResponse: Client → Server
message DialogueResponse {
    int32 npc_id = 1;
    int32 option_id = 2;
}

// InventoryUpdate: Server → Client
message InventoryUpdate {
    int32 slot = 1;
    int32 item_id = 2;
    int32 quantity = 3;
}

// Heartbeat: Server → Client (keep-alive)
message Heartbeat {
    int64 server_time = 1;
}
