syntax = "proto3";

package com.osrs.protocol;

option java_package = "com.osrs.protocol";
option java_outer_classname = "NetworkProto";

// Handshake: Client → Server
message Handshake {
    string username = 1;
    string password = 2;
    string access_token = 3;
}

// HandshakeResponse: Server → Client
message HandshakeResponse {
    bool success = 1;
    string message = 2;
    int32 player_id = 3;
    bool is_member = 4;
    bool is_admin_tools_enabled = 5;
    int32 selected_spell_id = 6;  // -1 = none; persisted auto-cast spell (SpellRegistry ID)
}

// PlayerMovement: Client → Server
message PlayerMovement {
    int32 x = 1;              // World tile X coordinate
    int32 y = 2;              // World tile Y coordinate
    int32 facing = 3;         // Direction 0-7 (N, NE, E, SE, S, SW, W, NW)
    int64 sequence = 4;       // Packet sequence number
}

// WalkTo: Client → Server (request to pathfind to destination)
message WalkTo {
    int32 target_x = 1;       // Target tile X
    int32 target_y = 2;       // Target tile Y
    int64 sequence = 3;       // Packet sequence number
}

// Entity: Server → Client (represents any entity)
message Entity {
    int32 id = 1;
    string name = 2;
    int32 x = 3;
    int32 y = 4;
    int32 facing = 5;
    int32 sprite_id = 6;
    int32 animation_frame = 7;
    int32 health = 8;
    int32 max_health = 9;
    bool is_player = 10;
    int32 combat_level = 11;
    int32 definition_id = 12;
}

// WorldState: Server → Client
message WorldState {
    repeated Entity entities = 1;
    int32 server_tick = 2;
    repeated EntityUpdate updates = 3;
}

// EntityUpdate: Partial update (only changed fields)
message EntityUpdate {
    int32 entity_id = 1;
    optional int32 x = 2;
    optional int32 y = 3;
    optional int32 facing = 4;
    optional int32 animation_frame = 5;
    optional int32 health = 6;
    optional bool is_player = 7;    // only set on player-join broadcasts
    optional string name = 8;       // only set on player-join broadcasts
    optional int32 definition_id = 9;
}

// CombatHit: Server → Client
message CombatHit {
    int32 attacker_id = 1;
    int32 target_id = 2;
    int32 damage = 3;
    bool hit = 4;
    int32 xp_awarded = 5;
    int32 attacker_health = 6;
    int32 target_health = 7;
    int32 target_x = 8;    // World tile X of the target (for hitsplat positioning)
    int32 target_y = 9;    // World tile Y of the target
    int32 attacker_x = 10; // World tile X of the attacker (for projectile origin in Phase 2)
    int32 attacker_y = 11; // World tile Y of the attacker
    // projectile_type: 0=none(melee), 1=arrow, 2=bolt, 3=spell_wind, 4=spell_water,
    //                  5=spell_fire, 6=spell_earth  (Phase 2 visual system)
    int32 projectile_type = 12;
}

// Attack: Client → Server
message Attack {
    int32 target_id = 1;
    int64 sequence = 2;
}

// HealthUpdate: Server → Client
message HealthUpdate {
    int32 entity_id = 1;
    int32 health = 2;
    int32 max_health = 3;
}

// QuestUpdate: Server → Client
enum QuestStatus {
    QUEST_NOT_STARTED = 0;
    QUEST_IN_PROGRESS = 1;
    QUEST_COMPLETED = 2;
}

message QuestTaskUpdate {
    string task_id = 1;
    string description = 2;
    int32 current_count = 3;
    int32 required_count = 4;
    bool completed = 5;
}

message QuestUpdate {
    int32 quest_id = 1;
    string quest_name = 2;
    int32 tasks_completed = 3;
    int32 tasks_total = 4;
    bool completed = 5;
    QuestStatus status = 6;
    bool miniquest = 7;
    int32 quest_points_reward = 8;
    int32 player_total_quest_points = 9;
    string quest_description = 10;
    repeated QuestTaskUpdate tasks = 11;
}

// DialogueOption: Server → Client
message DialogueOption {
    int32 option_id = 1;
    string text = 2;
}

// DialogueMessage: Server → Client
message DialogueMessage {
    string dialogue_id = 1;
    int32 npc_id = 2;
    string npc_text = 3;
    repeated DialogueOption options = 4;
}

// DialogueResponse: Client → Server
message DialogueResponse {
    int32 option_id = 1;
    int64 sequence = 2;
}

// PlayerDeath: Server → Client (local player died; respawn info included)
message PlayerDeath {
    int32 respawn_x = 1;   // Tile X of respawn point (Lumbridge)
    int32 respawn_y = 2;   // Tile Y of respawn point
}

// TalkToNpc: Client → Server (initiate dialogue with an NPC)
message TalkToNpc {
    int32 npc_id = 1;
    int64 sequence = 2;
}

enum SkillingType {
    SKILLING_NONE = 0;
    SKILLING_WOODCUTTING = 1;
    SKILLING_FISHING = 2;
    SKILLING_COOKING = 3;
    SKILLING_MINING = 4;
}

enum SkillingState {
    SKILLING_STATE_NONE = 0;
    SKILLING_STATE_QUEUED = 1;
    SKILLING_STATE_ACTIVE = 2;
    SKILLING_STATE_STOPPED = 3;
}

enum FishingActionType {
    FISHING_ACTION_NONE = 0;
    FISHING_ACTION_NET = 1;
    FISHING_ACTION_BAIT = 2;
    FISHING_ACTION_LURE = 3;
    FISHING_ACTION_CAGE = 4;
    FISHING_ACTION_HARPOON = 5;
}

message SkillingStateUpdate {
    SkillingType skilling_type = 1;
    SkillingState state = 2;
    int32 target_npc_id = 3;
    string message = 4;
}

// StartSkillingRequest: Client -> Server (begin resource action on target)
message StartSkillingRequest {
    int32 target_npc_id = 1;
    SkillingType skilling_type = 2;
    int64 sequence = 3;
    FishingActionType fishing_action = 4;
}

// DialoguePrompt: Server → Client
message DialoguePrompt {
    int32 npc_id = 1;
    string npc_says = 2;
    repeated DialogueOption options = 3;
}

// InventoryUpdate: Server → Client
message InventoryUpdate {
    int32 slot = 1;
    int32 item_id = 2;
    int32 quantity = 3;
    string item_name = 4;
    int32 flags = 5;
}

message BankSlot {
    int32 slot = 1;
    int32 item_id = 2;
    int64 quantity = 3;
    string item_name = 4;
    int32 flags = 5;
    int32 tab_index = 6;
}

message OpenBankRequest {
    int32 npc_id = 1;
    int64 sequence = 2;
}

message CloseBankRequest {
    int64 sequence = 1;
}

message DepositBankItem {
    int32 inventory_slot = 1;
    int32 amount = 2;
    int64 sequence = 3;
}

message WithdrawBankItem {
    int32 bank_slot = 1;
    int32 amount = 2;
    int64 sequence = 3;
}

message RearrangeBankSlots {
    int32 from_slot = 1;
    int32 to_slot = 2;
    int64 sequence = 3;
}

message MoveBankItemToTab {
    int32 bank_slot = 1;
    int32 target_tab_index = 2;
    int64 sequence = 3;
}

message AdminSetSkillLevel {
    int32 skill_index = 1;
    int32 target_level = 2;
    int64 sequence = 3;
}

message AdminAdjustSkillXp {
    int32 skill_index = 1;
    int64 delta_xp_whole = 2;
    int64 sequence = 3;
}

enum AdminItemDestination {
    ADMIN_ITEM_DESTINATION_INVENTORY = 0;
    ADMIN_ITEM_DESTINATION_BANK = 1;
}

enum AdminTravelDestination {
    ADMIN_TRAVEL_SPAWN = 0;
    ADMIN_TRAVEL_SANDBOX_GROVE = 1;
    ADMIN_TRAVEL_SANDBOX_FISHING_COVE = 2;
    ADMIN_TRAVEL_SANDBOX_MINING_COVE = 3;
}

message AdminSearchItems {
    string query = 1;
    int64 sequence = 2;
}

message AdminItemSearchEntry {
    int32 item_id = 1;
    string item_name = 2;
    int32 flags = 3;
}

message AdminItemSearchResults {
    string query = 1;
    repeated AdminItemSearchEntry entries = 2;
    int64 sequence = 3;
}

message AdminGiveItem {
    int32 item_id = 1;
    int64 quantity = 2;
    AdminItemDestination destination = 3;
    int64 sequence = 4;
}

message AdminTeleport {
    AdminTravelDestination destination = 1;
    int64 sequence = 2;
}

message AdminTeleportApplied {
    int32 x = 1;
    int32 y = 2;
}

message BankOpen {
    int32 capacity = 1;
    repeated BankSlot slots = 2;
}

message BankClose {
    string reason = 1;
}

message BankSlotUpdate {
    int32 slot = 1;
    int32 item_id = 2;
    int64 quantity = 3;
    string item_name = 4;
    int32 flags = 5;
    int32 tab_index = 6;
}

message AdminActionResult {
    bool success = 1;
    string message = 2;
    int64 sequence = 3;
}

// EquipmentUpdate: Server → Client
message EquipmentUpdate {
    int32 slot = 1;
    int32 item_id = 2;
    string item_name = 3;
    int32 flags = 4;
    int32 quantity = 5;    // Stack size; only meaningful for AMMO slot (slot 3), always 1 otherwise
    int32 attack_range = 6; // Weapon attack range; only meaningful for WEAPON slot (slot 4), 0 otherwise
}

// GroundItemSpawn: Server → Client
message GroundItemSpawn {
    int32 ground_item_id = 1;
    int32 item_id = 2;
    int32 quantity = 3;
    int32 x = 4;
    int32 y = 5;
    string item_name = 6;
}

// GroundItemDespawn: Server → Client
message GroundItemDespawn {
    int32 ground_item_id = 1;
}

// NpcDespawn: Server → Client (NPC died and its model should be removed)
message NpcDespawn {
    int32 npc_id = 1;
}

// NpcRespawn: Server → Client (NPC reappeared — full entity data re-sent)
message NpcRespawn {
    int32 npc_id = 1;
    string name = 2;
    int32 x = 3;
    int32 y = 4;
    int32 health = 5;
    int32 max_health = 6;
    int32 combat_level = 7;
    int32 definition_id = 8;
}

// PickupItem: Client → Server
message PickupItem {
    int32 ground_item_id = 1;
    int64 sequence = 2;
}

// DropItem: Client → Server
message DropItem {
    int32 inventory_slot = 1;
    int64 sequence = 2;
}

// UseItem: Client → Server (eat, drink, wield, wear)
message UseItem {
    int32 inventory_slot = 1;
    string action = 2;
    int64 sequence = 3;
}

// UseItemOnItem: Client → Server (use one inventory item on another)
message UseItemOnItem {
    int32 source_slot = 1;
    int32 target_slot = 2;
    int64 sequence    = 3;
}

// TogglePrayer: Client → Server (activate or deactivate a prayer by ID)
message TogglePrayer {
    int32 prayer_id = 1;
    int64 sequence  = 2;
}

// Client → Server: remove item from equipment slot, return to inventory
message UnequipItem {
    int32 equipment_slot = 1;
}

// SwapInventorySlots: Client → Server (drag-and-drop rearrange)
message SwapInventorySlots {
    int32 from_slot = 1;
    int32 to_slot = 2;
    int64 sequence = 3;
}

// SetCombatStyle: Client → Server (player changed attack style)
message SetCombatStyle {
    int32 style = 1;   // 0=Accurate 1=Aggressive 2=Defensive 3=Controlled
    int64 sequence = 2;
}

// Heartbeat: Server → Client (keep-alive)
message Heartbeat {
    int64 server_time = 1;
}

// ChatMessage: Server → Client (game messages shown in chat/message area)
message ChatMessage {
    string text = 1;
    // 0 = game message (white), 1 = error/can't-do (red), 2 = info (cyan)
    int32 type = 2;
}

// PublicChat: Client → Server (player typed a public chat message)
message PublicChat {
    string text = 1;   // max 80 characters; server validates and rejects if empty/too long
}

// ExamineNpc: Client -> Server (request examine text in chat)
message ExamineNpc {
    int32 npc_id = 1;
}

// ExamineItem: Client -> Server (request examine text for an inventory item)
message ExamineItem {
    int32 inventory_slot = 1;   // 0-27
}

message PlayerEntry {
    string name = 1;
    int64 player_id = 2;
    bool online = 3;
}

message FriendsListUpdate {
    repeated PlayerEntry friends = 1;
}

message FriendAction {
    enum Action {
        ADD = 0;
        REMOVE = 1;
    }
    Action action = 1;
    int64 player_id = 2;
    string name = 3;
    int64 sequence = 4;
}

message FriendActionResult {
    bool success = 1;
    string error = 2;
    int64 sequence = 3;
}

// LogoutRequest: Client -> Server (explicitly log out and persist state)
message LogoutRequest {
    int64 sequence = 1;
}

// SetAutoRetaliate: Client -> Server (toggle auto-retaliate on/off)
message SetAutoRetaliate {
    bool enabled = 1;
}

// SetSpell: Client → Server (select a combat spell to auto-cast)
message SetSpell {
    int32 spell_id = 1;   // SpellRegistry spell ID (1–8); -1 = deselect
    int64 sequence = 2;
}

// ChatBroadcast: Server → Client (public chat from a nearby player, broadcast to all in range)
message ChatBroadcast {
    int32  sender_id   = 1;   // Entity ID of the sender (for overhead text placement)
    string sender_name = 2;   // Display name shown before the message
    string text        = 3;   // Message content (already validated by server)
    int32  x           = 4;   // Sender's tile X at time of sending (for range-gating on client)
    int32  y           = 5;   // Sender's tile Y
}

// LogoutResponse: Server -> Client (acknowledges logout request)
message LogoutResponse {
    bool success = 1;
    string message = 2;
}

// PrayerPointsUpdate: Server → Client (current / maximum prayer points)
message PrayerPointsUpdate {
    int32 current = 1;
    int32 maximum = 2;
}

// SkillUpdate: Server → Client (XP gain / level-up)
message SkillUpdate {
    int32 skill_index = 1;   // 0=Attack, 1=Strength, 2=Defence, 3=Hitpoints, 4=Ranged, 5=Magic
    int32 new_level = 2;
    int64 total_xp = 3;
    bool leveled_up = 4;
}

// Server → Client: full equipment bonus snapshot (sent after every equip/unequip)
message EquipmentBonuses {
    int32 stab_attack     = 1;
    int32 slash_attack    = 2;
    int32 crush_attack    = 3;
    int32 magic_attack    = 4;
    int32 ranged_attack   = 5;
    int32 stab_defence    = 6;
    int32 slash_defence   = 7;
    int32 crush_defence   = 8;
    int32 magic_defence   = 9;
    int32 ranged_defence  = 10;
    int32 melee_strength  = 11;
    int32 ranged_strength = 12;
    int32 magic_damage    = 13;
    int32 prayer          = 14;
}

// ClientMessage: wrapper for all client → server messages
message ClientMessage {
    oneof payload {
        Handshake handshake = 1;
        PlayerMovement movement = 2;
        WalkTo walk_to = 3;
        Attack attack = 4;
        DialogueResponse dialogue_response = 5;
        TalkToNpc talk_to_npc = 6;
        PickupItem pickup_item = 7;
        DropItem drop_item = 8;
        UseItem use_item = 9;
        SwapInventorySlots swap_inventory_slots = 10;
        SetCombatStyle set_combat_style = 11;
        PublicChat public_chat = 12;
        ExamineNpc examine_npc = 13;
        LogoutRequest logout_request = 14;
        StartSkillingRequest start_skilling = 15;
        UseItemOnItem use_item_on_item = 16;
        UnequipItem unequip_item   = 17;
        TogglePrayer toggle_prayer = 18;
        ExamineItem examine_item = 19;
        FriendAction friend_action = 20;
        SetAutoRetaliate set_auto_retaliate = 21;
        OpenBankRequest open_bank_request = 22;
        CloseBankRequest close_bank_request = 23;
        DepositBankItem deposit_bank_item = 24;
        WithdrawBankItem withdraw_bank_item = 25;
        RearrangeBankSlots rearrange_bank_slots = 26;
        MoveBankItemToTab move_bank_item_to_tab = 27;
        AdminSetSkillLevel admin_set_skill_level = 28;
        AdminAdjustSkillXp admin_adjust_skill_xp = 29;
        AdminSearchItems admin_search_items = 30;
        AdminGiveItem admin_give_item = 31;
        AdminTeleport admin_teleport = 32;
        SetSpell set_spell = 33;
    }
}

// ServerMessage: wrapper for all server → client messages
message ServerMessage {
    oneof payload {
        HandshakeResponse handshake_response = 1;
        WorldState world_state = 2;
        CombatHit combat_hit = 3;
        HealthUpdate health_update = 4;
        QuestUpdate quest_update = 5;
        DialogueMessage dialogue_message = 6;
        DialoguePrompt dialogue_prompt = 7;
        InventoryUpdate inventory_update = 8;
        Heartbeat heartbeat = 9;
        SkillUpdate skill_update = 10;
        EntityUpdate entity_update = 11;  // Live position delta (NPC move, player move, etc.)
        PlayerDeath player_death = 12;    // Sent only to the dying player; includes respawn coords
        EquipmentUpdate equipment_update = 13;
        GroundItemSpawn ground_item_spawn = 14;
        GroundItemDespawn ground_item_despawn = 15;
        NpcDespawn npc_despawn = 16;
        NpcRespawn npc_respawn = 17;
        ChatMessage chat_message = 18;    // Game message shown in chat area
        ChatBroadcast chat_broadcast = 19; // Public chat from a nearby player
        LogoutResponse logout_response = 20;
        SkillingStateUpdate skilling_state_update = 21;
        EquipmentBonuses equipment_bonuses = 22;
        PrayerPointsUpdate prayer_points_update = 23;
        FriendsListUpdate friends_list_update = 24;
        FriendActionResult friend_action_result = 25;
        BankOpen bank_open = 26;
        BankClose bank_close = 27;
        BankSlotUpdate bank_slot_update = 28;
        AdminActionResult admin_action_result = 29;
        AdminItemSearchResults admin_item_search_results = 30;
        AdminTeleportApplied admin_teleport_applied = 31;
    }
}
