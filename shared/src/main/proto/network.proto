syntax = "proto3";

package com.osrs.protocol;

option java_package = "com.osrs.protocol";
option java_outer_classname = "NetworkProto";

// Handshake: Client → Server
message Handshake {
    string username = 1;
    string password = 2;
}

// HandshakeResponse: Server → Client
message HandshakeResponse {
    bool success = 1;
    string message = 2;
    int32 player_id = 3;
}

// PlayerMovement: Client → Server
message PlayerMovement {
    int32 x = 1;              // World tile X coordinate
    int32 y = 2;              // World tile Y coordinate
    int32 facing = 3;         // Direction 0-7 (N, NE, E, SE, S, SW, W, NW)
    int64 sequence = 4;       // Packet sequence number
}

// WalkTo: Client → Server (request to pathfind to destination)
message WalkTo {
    int32 target_x = 1;       // Target tile X
    int32 target_y = 2;       // Target tile Y
    int64 sequence = 3;       // Packet sequence number
}

// Entity: Server → Client (represents any entity)
message Entity {
    int32 id = 1;
    string name = 2;
    int32 x = 3;
    int32 y = 4;
    int32 facing = 5;
    int32 sprite_id = 6;
    int32 animation_frame = 7;
    int32 health = 8;
    int32 max_health = 9;
    bool is_player = 10;
}

// WorldState: Server → Client
message WorldState {
    repeated Entity entities = 1;
    int32 server_tick = 2;
    repeated EntityUpdate updates = 3;
}

// EntityUpdate: Partial update (only changed fields)
message EntityUpdate {
    int32 entity_id = 1;
    optional int32 x = 2;
    optional int32 y = 3;
    optional int32 facing = 4;
    optional int32 animation_frame = 5;
    optional int32 health = 6;
}

// CombatHit: Server → Client
message CombatHit {
    int32 attacker_id = 1;
    int32 target_id = 2;
    int32 damage = 3;
    bool hit = 4;
    int32 xp_awarded = 5;
    int32 attacker_health = 6;
    int32 target_health = 7;
    int32 target_x = 8;   // World tile X of the target (for hitsplat positioning)
    int32 target_y = 9;   // World tile Y of the target
}

// Attack: Client → Server
message Attack {
    int32 target_id = 1;
    int64 sequence = 2;
}

// HealthUpdate: Server → Client
message HealthUpdate {
    int32 entity_id = 1;
    int32 health = 2;
    int32 max_health = 3;
}

// QuestUpdate: Server → Client
message QuestUpdate {
    int32 quest_id = 1;
    string quest_name = 2;
    int32 tasks_completed = 3;
    int32 tasks_total = 4;
    bool completed = 5;
}

// DialogueOption: Server → Client
message DialogueOption {
    int32 option_id = 1;
    string text = 2;
}

// DialogueMessage: Server → Client
message DialogueMessage {
    string dialogue_id = 1;
    int32 npc_id = 2;
    string npc_text = 3;
    repeated DialogueOption options = 4;
}

// DialogueResponse: Client → Server
message DialogueResponse {
    int32 option_id = 1;
    int64 sequence = 2;
}

// PlayerDeath: Server → Client (local player died; respawn info included)
message PlayerDeath {
    int32 respawn_x = 1;   // Tile X of respawn point (Lumbridge)
    int32 respawn_y = 2;   // Tile Y of respawn point
}

// TalkToNpc: Client → Server (initiate dialogue with an NPC)
message TalkToNpc {
    int32 npc_id = 1;
    int64 sequence = 2;
}

// DialoguePrompt: Server → Client
message DialoguePrompt {
    int32 npc_id = 1;
    string npc_says = 2;
    repeated DialogueOption options = 3;
}

// InventoryUpdate: Server → Client
message InventoryUpdate {
    int32 slot = 1;
    int32 item_id = 2;
    int32 quantity = 3;
}

// Heartbeat: Server → Client (keep-alive)
message Heartbeat {
    int64 server_time = 1;
}

// SkillUpdate: Server → Client (XP gain / level-up)
message SkillUpdate {
    int32 skill_index = 1;   // 0=Attack, 1=Strength, 2=Defence, 3=Hitpoints, 4=Ranged, 5=Magic
    int32 new_level = 2;
    int64 total_xp = 3;
    bool leveled_up = 4;
}

// ClientMessage: wrapper for all client → server messages
message ClientMessage {
    oneof payload {
        Handshake handshake = 1;
        PlayerMovement movement = 2;
        WalkTo walk_to = 3;
        Attack attack = 4;
        DialogueResponse dialogue_response = 5;
        TalkToNpc talk_to_npc = 6;
    }
}

// ServerMessage: wrapper for all server → client messages
message ServerMessage {
    oneof payload {
        HandshakeResponse handshake_response = 1;
        WorldState world_state = 2;
        CombatHit combat_hit = 3;
        HealthUpdate health_update = 4;
        QuestUpdate quest_update = 5;
        DialogueMessage dialogue_message = 6;
        DialoguePrompt dialogue_prompt = 7;
        InventoryUpdate inventory_update = 8;
        Heartbeat heartbeat = 9;
        SkillUpdate skill_update = 10;
        EntityUpdate entity_update = 11;  // Live position delta (NPC move, player move, etc.)
        PlayerDeath player_death = 12;    // Sent only to the dying player; includes respawn coords
    }
}
